
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --bg: #1A1A1A;
            --surface: #2C2C2C;
            --primary: #64ffda;
            --text-primary: #EAEAEA;
            --text-secondary: #AAAAAA;
            --border: #444444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        #noteInput {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: var(--surface);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.3s ease;
        }
        #noteInput:focus {
            border-color: var(--primary);
        }

        .main-btn {
            background-color: var(--primary);
            color: var(--bg);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        .main-btn:hover { background-color: #52d8c9; }

        .item-list {
            list-style: none;
            padding: 0;
            margin-top: 25px;
        }

        .item {
            background: var(--surface);
            margin-bottom: 12px;
            padding: 20px;
            border-radius: 8px;
            position: relative;
            animation: fadeIn 0.4s ease;
            border-left: 4px solid transparent;
            transition: border-left-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }
        .item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-left-color: var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .item-text { 
            display: block; 
            word-wrap: break-word; 
            padding-right: 50px; /* Space for delete button */
        }

        .timestamp { font-size: 0.7rem; color: var(--text-secondary); margin-top: 10px; display: block;}

        .del-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 5px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            position: absolute;
            top: 15px;
            right: 15px;
            transition: color 0.3s, background-color 0.3s;
        }
        .del-btn:hover { color: #FF6B6B; background-color: rgba(255, 107, 107, 0.1); }

        .bookmarklet-info {
            background: var(--surface);
            padding: 25px;
            margin-top: 40px;
            border-radius: 8px;
            text-align: center;
        }
        .bookmarklet-info h2 { font-weight: 500; color: var(--primary); margin-top: 0; }
        .bookmarklet-info p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }
        
        .bookmarklet-button {
            display: inline-block;
            padding: 12px 25px;
            background-color: var(--primary);
            color: var(--bg);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin: 15px 0;
            transition: background-color 0.3s;
            cursor: grab;
            user-select: none;
        }
        .bookmarklet-button:hover {
            background-color: #52d8c9;
        }

        .bookmarklet-fallback {
            font-size: 0.8rem;
            margin-top: 15px;
            color: var(--text-secondary);
        }

    </style>
</head>
<body>

<div class="container">
    <textarea id="noteInput" rows="4" placeholder="What's on your mind?..."></textarea>
    <button class="main-btn" onclick="addItem()">Save Note</button>
    <ul id="noteList" class="item-list"></ul>

    <div class="bookmarklet-info">
        <h2>The Bookmarklet</h2>
        <p>Drag the button below to your bookmarks bar to open your notes on any website.</p>
        <a href="javascript:(function(){var d=document;var s=d.createElement('script');s.src='https://diddyshousee.github.io/Jen-website-trust-so-real/bookmarklet.js?v='+new Date().getTime();d.body.appendChild(s);})();" class="bookmarklet-button">Drag to Bookmarks</a>
        <p class="bookmarklet-fallback">Or, right-click the button, copy link address, and create a new bookmark.</p>
    </div>
</div>

<script>
    window.onload = () => loadData('noteList');

    function addItem() {
        const input = document.getElementById('noteInput');
        const list = document.getElementById('noteList');
        if (input.value.trim() === "") return;

        const time = new Date().toLocaleString();
        createListElement(list, input.value, time);
        input.value = "";
        saveData('noteList');
    }

    function createListElement(parent, text, time) {
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
            <span class="item-text">${text.replace(/\n/g, '<br>')}</span>
            <span class="timestamp">${time}</span>
            <button class="del-btn" onclick="removeMe(this)">&times;</button>
        `;
        parent.prepend(li);
    }

    function removeMe(btn) {
        btn.closest('.item').remove();
        saveData('noteList');
    }

    function saveData(listId) {
        const list = document.getElementById(listId);
        const items = Array.from(list.querySelectorAll('.item')).map(li => ({
            text: li.querySelector('.item-text').innerHTML.replace(/<br>/g, '\n'),
            time: li.querySelector('.timestamp').innerText
        }));
        localStorage.setItem(listId, JSON.stringify(items));
    }

    function loadData(listId) {
        const saved = localStorage.getItem(listId);
        if (!saved) return;
        const items = JSON.parse(saved);
        const list = document.getElementById(listId);
        // Load in original order as we prepend every time
        items.forEach(item => createListElement(list, item.text, item.time));
    }
</script>

</body>
</html>
